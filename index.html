<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortaleza Frango — Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E0300;--s1:#150700;--s2:#1C0C00;--s3:#271200;--s4:#371A00;
  --red:#B52208;--red2:#CF3010;--red3:#851806;
  --gold:#C8882E;--gold2:#E8A840;--gold3:#F5C060;--gold4:#FCDEA0;
  --cream:#F4EAD2;--muted:#B88850;--faint:#785028;--dim:#422810;
  --teal:#14887A;--green:#22C55E;
  --b1:rgba(200,136,46,0.13);--b2:rgba(200,136,46,0.26);--b3:rgba(200,136,46,0.48);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;overflow-x:hidden;}

/* HERO */
.hero{position:relative;overflow:hidden;background:linear-gradient(170deg,#6A0E00 0%,#3C0600 28%,#1C0800 58%,#0E0300 100%);text-align:center;}
.hero-topbar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--red) 20%,var(--gold2) 50%,var(--red) 80%,transparent);}
.hero-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:620px;height:440px;background:radial-gradient(ellipse,rgba(181,34,8,0.42) 0%,rgba(90,10,0,0.18) 45%,transparent 70%);pointer-events:none;}
.hero-glow2{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:700px;height:180px;background:radial-gradient(ellipse,rgba(200,136,46,0.13) 0%,transparent 70%);pointer-events:none;}
.hero-body{position:relative;z-index:2;padding:28px 24px 22px;}

/* Mascot */
.mascot-outer{position:relative;display:inline-block;margin-bottom:10px;}
.mascot-ring{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(200,136,46,0.22);animation:spin 14s linear infinite;}
.mascot-ring2{position:absolute;inset:-17px;border-radius:50%;border:1px dashed rgba(200,136,46,0.11);animation:spin 22s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.mascot-img{width:112px;height:112px;border-radius:50%;object-fit:cover;object-position:50% 12%;border:2.5px solid var(--gold2);box-shadow:0 0 0 5px rgba(200,136,46,0.16),0 0 36px rgba(181,34,8,0.5),0 8px 28px rgba(0,0,0,0.7);}

/* Brand */
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:4px;line-height:1;background:linear-gradient(180deg,#fff 0%,#FCDEA0 38%,#C8882E 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 10px rgba(181,34,8,0.4));}
.hero-tagline{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px;}
.hero-line{height:1px;width:34px;background:linear-gradient(90deg,transparent,var(--gold2));}
.hero-line.r{background:linear-gradient(90deg,var(--gold2),transparent);}
.hero-tag-txt{font-size:11px;font-weight:500;letter-spacing:3.5px;color:var(--gold3);text-transform:uppercase;}
.spill{display:inline-flex;align-items:center;gap:7px;border-radius:50px;padding:7px 18px;font-size:12px;font-weight:600;letter-spacing:0.3px;margin-top:16px;}
.sdot{width:7px;height:7px;border-radius:50%;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.65);}}
.hero-info{font-size:11px;color:var(--dim);margin-top:7px;letter-spacing:0.5px;}

/* Badges */
.hero-badges{display:flex;justify-content:center;border-top:1px solid var(--b1);position:relative;z-index:2;}
.hbadge{flex:1;max-width:110px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid var(--b1);}
.hbadge:last-child{border-right:none;}
.hbadge-i{font-size:16px;}
.hbadge-t{font-size:11px;font-weight:600;color:var(--gold2);letter-spacing:0.3px;}
.hbadge-s{font-size:9px;color:var(--dim);}

/* NAV */
.cat-nav{position:sticky;top:0;z-index:80;background:rgba(14,3,0,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 20px;}
.cat-scroll{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:11px 0;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:8px 20px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid transparent;background:transparent;color:var(--dim);transition:all .2s;letter-spacing:0.3px;}
.cat-tab:hover{color:var(--muted);background:rgba(255,255,255,0.04);}
.cat-tab.active{background:linear-gradient(135deg,var(--red2),var(--red3));color:#fff;box-shadow:0 4px 16px rgba(181,34,8,0.42);}

/* MENU */
.menu-body{padding-bottom:120px;}
.sec-wrap{padding:24px 20px 2px;}
.sec-eye{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--gold2);text-transform:uppercase;margin-bottom:5px;}
.sec-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--cream);line-height:1;}
.sec-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);margin-top:5px;}
.sec-dot{width:4px;height:4px;border-radius:50%;background:var(--gold2);}

/* GRID */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 20px 8px;}
.pcard{background:var(--s2);border:1px solid var(--b1);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),border-color .2s,box-shadow .2s;position:relative;}
.pcard:hover{transform:translateY(-5px) scale(1.015);border-color:var(--b2);box-shadow:0 20px 40px rgba(0,0,0,0.55);}
.pcard:active{transform:scale(0.97);}
.pcard-img{width:100%;aspect-ratio:1/1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;}
.pcard-em{font-size:52px;transition:transform .4s cubic-bezier(.34,1.2,.64,1);position:relative;z-index:1;}
.pcard:hover .pcard-em{transform:scale(1.13);}
.pcard-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(0,0,0,0.2));pointer-events:none;}
.pcard-pip{position:absolute;top:10px;left:10px;width:6px;height:6px;border-radius:50%;box-shadow:0 0 8px currentColor;}
.cf .pcard-img{background:linear-gradient(145deg,#220C00,#361800);}
.cc .pcard-img{background:linear-gradient(145deg,#200500,#300900);}
.ce .pcard-img{background:linear-gradient(145deg,#1C1000,#2C1C00);}
.cf .pcard-pip{color:var(--gold2);}
.cc .pcard-pip{color:var(--red2);}
.ce .pcard-pip{color:#9A6820;}
.pcard-body{padding:11px 13px 13px;}
.pcard-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--cream);line-height:1.1;}
.pcard-desc{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.5;}
.pcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px;}
.pcard-price{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px;color:var(--gold2);line-height:1;}
.pcard-unit{font-size:10px;color:var(--dim);margin-top:1px;}
.pcard-add{width:36px;height:36px;border-radius:11px;border:none;background:linear-gradient(145deg,var(--red2),var(--red3));color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 4px 14px rgba(181,34,8,0.5);transition:transform .15s,box-shadow .15s;}
.pcard-add:hover{box-shadow:0 6px 20px rgba(181,34,8,0.7);}
.pcard-add:active{transform:scale(0.83);}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px 20px max(16px,env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(14,3,0,0.98),rgba(14,3,0,0.8));backdrop-filter:blur(20px);border-top:1px solid rgba(181,34,8,0.22);transition:transform .36s cubic-bezier(.32,.72,0,1),opacity .3s;}
.cart-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none;}
.cart-btn{width:100%;max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#CF3010,#851806);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 18px;cursor:pointer;box-shadow:0 8px 30px rgba(181,34,8,0.5);transition:box-shadow .2s;}
.cart-btn:hover{box-shadow:0 12px 40px rgba(181,34,8,0.68);}
.cart-left{display:flex;align-items:center;gap:10px;}
.cart-label{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.cart-badge{background:rgba(255,255,255,0.22);color:#fff;border-radius:6px;width:22px;height:22px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;}
.cart-total{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--gold3);}

/* SHEET */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--s1);border-radius:24px 24px 0 0;border-top:1px solid var(--b2);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.s-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:14px auto 0;}
.s-inner{padding:20px 22px 36px;}
.s-head{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--cream);margin-bottom:2px;}
.s-sub{font-size:13px;color:var(--dim);margin-bottom:20px;}

/* Cart items */
.ci{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--b1);}
.ci-em{width:52px;height:52px;border-radius:12px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.ci-inf{flex:1;min-width:0;}
.ci-nm{font-size:14px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-kg{display:inline-block;font-size:11px;color:var(--gold2);font-weight:600;background:rgba(200,136,46,0.1);border-radius:4px;padding:1px 7px;margin-top:3px;}
.ci-pr{font-size:13px;color:var(--gold2);font-weight:700;margin-top:4px;}
.qrow{display:flex;align-items:center;gap:9px;margin-top:8px;}
.qbtn{width:28px;height:28px;border-radius:8px;border:1px solid var(--b2);background:var(--s3);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cream);transition:border-color .15s;}
.qbtn:hover{border-color:var(--red2);}

/* Total & misc */
.t-row{display:flex;justify-content:space-between;align-items:center;padding:18px 0 8px;border-top:1px solid var(--b1);margin-top:4px;}
.t-lbl{font-size:14px;font-weight:600;color:var(--muted);}
.t-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--gold2);}
.sdiv{height:1px;background:var(--b1);margin:6px 0 0;}
.slbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);margin:20px 0 10px;}

/* Payment */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.po{border:1px solid var(--b2);border-radius:12px;padding:13px 10px;cursor:pointer;text-align:center;background:var(--s2);position:relative;transition:all .18s;}
.po:hover{border-color:var(--b3);}
.po.sel{border-color:var(--gold2);background:rgba(200,136,46,0.08);}
.pck{position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;border:1.5px solid var(--b2);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;transition:all .15s;}
.po.sel .pck{background:var(--gold2);border-color:var(--gold2);}
.pi{font-size:22px;margin-bottom:5px;display:flex;align-items:center;justify-content:center;min-height:28px;}
.pn{font-size:12px;font-weight:600;color:var(--muted);}
.po.sel .pn{color:var(--gold2);}

/* Delivery */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.do{border:1px solid var(--b2);border-radius:12px;padding:16px 10px;cursor:pointer;text-align:center;background:var(--s2);transition:all .18s;}
.do:hover{border-color:var(--b3);}
.do.sel{border-color:var(--teal);background:rgba(20,136,122,0.08);}
.di{font-size:24px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;}
.dl{font-size:13px;font-weight:600;color:var(--muted);}
.do.sel .dl{color:#2DD4BF;}
.aw{display:none;}
.aw.show{display:block;}
.tw{display:none;}
.tw.show{display:block;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Fields */
.fl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--dim);display:block;margin-top:14px;margin-bottom:5px;}
.fi{width:100%;border:1px solid var(--b2);border-radius:10px;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;outline:none;color:var(--cream);background:var(--s2);transition:border .2s,box-shadow .2s;}
.fi:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(200,136,46,0.1);}
.fi::placeholder{color:var(--dim);}
.btn-fin{width:100%;margin-top:20px;border:none;border-radius:14px;padding:17px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--red2),var(--red3));box-shadow:0 8px 26px rgba(181,34,8,0.48);transition:box-shadow .15s;}
.btn-fin:hover{box-shadow:0 10px 34px rgba(181,34,8,0.62);}

/* Success */
.sw{text-align:center;padding:40px 0 20px;}
.si{font-size:60px;margin-bottom:16px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.st{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:var(--green);margin-bottom:8px;}
.sm{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:26px;}
.btn-back{width:100%;background:var(--s3);color:var(--cream);border:1px solid var(--b2);border-radius:14px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.ce-wrap{text-align:center;padding:44px 0;}
.ce-em{font-size:46px;opacity:0.3;margin-bottom:10px;}
.ce-msg{font-size:14px;color:var(--dim);}

/* KG MODAL */
.kg-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(8px);}
.kg-ov.open{opacity:1;pointer-events:all;}
.kg-box{background:var(--s2);border:1px solid var(--b2);border-radius:22px;padding:26px 22px;width:100%;max-width:340px;transform:scale(0.92) translateY(14px);transition:transform .25s cubic-bezier(.34,1.2,.64,1);position:relative;}
.kg-ov.open .kg-box{transform:scale(1) translateY(0);}
.kg-cl{position:absolute;top:15px;right:16px;background:var(--s3);border:1px solid var(--b1);border-radius:50%;width:30px;height:30px;font-size:17px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:color .15s;}
.kg-cl:hover{color:var(--cream);}
.kg-t{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--cream);margin-bottom:2px;}
.kg-i{font-size:13px;color:var(--gold2);font-weight:600;margin-bottom:16px;}
.kg-chs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px;}
.kgc{border:1px solid var(--b2);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;background:var(--s3);color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all .15s;}
.kgc:hover{border-color:var(--b3);color:var(--cream);}
.kgc.on{border-color:var(--red2);background:rgba(207,48,16,0.12);color:var(--red2);}
.kgrow{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.kgi{flex:1;border:1px solid var(--b2);border-radius:10px;padding:10px 12px;background:var(--s3);color:var(--cream);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border .2s;}
.kgi:focus{border-color:var(--gold2);}
.kgi::placeholder{color:var(--dim);}
.kgu{font-size:13px;color:var(--dim);font-weight:600;white-space:nowrap;}
.kgp{text-align:center;min-height:34px;margin-bottom:14px;}
.kgpv{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1.5px;color:var(--gold2);}
.kgps{font-size:11px;color:var(--dim);margin-top:1px;}
.btn-kgc{width:100%;background:linear-gradient(135deg,var(--red2),var(--red3));color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(181,34,8,0.44);transition:opacity .15s;}
.btn-kgc:hover{opacity:0.9;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-topbar"></div>
  <div class="hero-glow"></div>
  <div class="hero-glow2"></div>
  <div class="hero-body">
    <div class="mascot-outer">
      <div class="mascot-ring"></div>
      <div class="mascot-ring2"></div>
      <img class="mascot-img" id="mascot-img" alt="Fortaleza Frango">
    </div>
    <div class="hero-name">FORTALEZA FRANGO</div>
    <div class="hero-tagline">
      <div class="hero-line"></div>
      <span class="hero-tag-txt">Frango Abatido</span>
      <div class="hero-line r"></div>
    </div>
    <div class="spill" id="spill">
      <span class="sdot" id="sdot"></span>
      <span id="stxt">Verificando...</span>
    </div>
    <div class="hero-info">Seg – Sáb &nbsp;·&nbsp; 7h às 18h &nbsp;·&nbsp; (85) 98592-8140</div>
  </div>
  <div class="hero-badges">
    <div class="hbadge"><span class="hbadge-i">🛵</span><span class="hbadge-t">Entrega</span><span class="hbadge-s">Rápida</span></div>
    <div class="hbadge"><span class="hbadge-i">✅</span><span class="hbadge-t">Qualidade</span><span class="hbadge-s">Garantida</span></div>
    <div class="hbadge"><span class="hbadge-i">📍</span><span class="hbadge-t">Fortaleza</span><span class="hbadge-s">e região</span></div>
    <div class="hbadge"><span class="hbadge-i">🐔</span><span class="hbadge-t">Frescos</span><span class="hbadge-s">Diariamente</span></div>
  </div>
</div>

<div class="cat-nav">
  <div class="cat-scroll">
    <button class="cat-tab active" data-cat="frango" onclick="switchCat('frango')">🐔 Frango</button>
    <button class="cat-tab" data-cat="carnes" onclick="switchCat('carnes')">🥩 Carnes</button>
    <button class="cat-tab" data-cat="embutidos" onclick="switchCat('embutidos')">🌭 Embutidos</button>
  </div>
</div>

<div class="menu-body" id="menu-body"></div>

<div class="cart-bar hidden" id="cart-bar">
  <button class="cart-btn" onclick="openCart()">
    <div class="cart-left">
      <span style="font-size:16px">🛒</span>
      <span class="cart-label">Ver pedido</span>
      <span class="cart-badge" id="cart-count">0</span>
    </div>
    <span class="cart-total" id="cart-total-bar">R$ 0,00</span>
  </button>
</div>

<div class="overlay" id="overlay" onclick="closeIfOut(event)">
  <div class="sheet">
    <div class="s-handle"></div>
    <div class="s-inner" id="sheet-content"></div>
  </div>
</div>

<div class="kg-ov" id="kg-ov">
  <div class="kg-box">
    <button class="kg-cl" onclick="closeKg()">&times;</button>
    <div class="kg-t">Quantos kg?</div>
    <div class="kg-i" id="kg-lbl">—</div>
    <div class="kg-chs">
      <div class="kgc" onclick="selKg(0.5)">0,5 kg</div>
      <div class="kgc" onclick="selKg(1)">1 kg</div>
      <div class="kgc" onclick="selKg(1.5)">1,5 kg</div>
      <div class="kgc" onclick="selKg(2)">2 kg</div>

// ── MASCOTE (Base64 carregado via JS para evitar problemas de parsing) ──
var MASCOT_B64 = '';
function loadMascot() {
  // O mascote é carregado do arquivo externo via fetch ou definido abaixo
  // Para uso standalone, cole o base64 na variável abaixo:
  // MASCOT_B64 = 'seu_base64_aqui';
  var img = document.getElementById('mascot-img');
  if (MASCOT_B64) {
    img.src = 'data:image/jpeg;base64,' + MASCOT_B64;
  } else {
    img.src = 'logo.jpg'; // fallback para arquivo externo
    img.onerror = function() { img.style.background='var(--s3)'; img.style.display='flex'; img.innerHTML='🐔'; };
  }
}

// ── MENU ──
function switchCat(cat) {
  document.querySelectorAll('.cat-tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('[data-cat="' + cat + '"]').classList.add('active');
  renderMenu(cat);
}

function renderMenu(cat) {
  var d = menu[cat];
  var h = '<div class="sec-wrap">'
    + '<div class="sec-eye">' + d.eye + '</div>'
    + '<div class="sec-name">' + d.label + '</div>'
    + '<div class="sec-hint"><span class="sec-dot"></span>Preços por quilograma (kg) · ' + d.items.length + ' produtos</div>'
    + '</div><div class="pgrid">';
  for (var i = 0; i < d.items.length; i++) {
    var item = d.items[i];
    h += '<div class="pcard ' + d.cls + '">'
      + '<div class="pcard-img">'
      + (item.img ? '<img src="' + item.img + '" alt="' + item.name + '" style="width:100%;height:100%;object-fit:cover;display:block;">' : '<div class="pcard-em">' + item.emoji + '</div>')
      + '<div class="pcard-shine"></div><span class="pcard-pip"></span></div>'
      + '<div class="pcard-body">'
      + '<div class="pcard-name">' + item.name + '</div>'
      + '<div class="pcard-desc">' + item.desc + '</div>'
      + '<div class="pcard-foot">'
      + '<div><div class="pcard-price">R$ ' + fK(item.priceKg) + '</div><div class="pcard-unit">por kg</div></div>'
      + '<button class="pcard-add" onclick="openKg(\'' + cat + '\',' + i + ')">+</button>'
      + '</div></div></div>';
  }
  h += '</div>';
  document.getElementById('menu-body').innerHTML = h;
}

// ── KG MODAL ──
function openKg(cat, idx) {
  kgPend = { cat: cat, idx: idx };
  kgSel = 0;
  var it = menu[cat].items[idx];
  document.getElementById('kg-lbl').textContent = it.name + ' — R$ ' + fK(it.priceKg) + '/kg';
  document.getElementById('kgi').value = '';
  document.getElementById('kgpv').textContent = '';
  document.getElementById('kgps').textContent = '';
  document.querySelectorAll('.kgc').forEach(function(b) { b.classList.remove('on'); });
  document.getElementById('kg-ov').classList.add('open');
}
function closeKg() {
  document.getElementById('kg-ov').classList.remove('open');
  kgPend = null; kgSel = 0;
}
function selKg(v) {
  kgSel = v;
  document.getElementById('kgi').value = '';
  document.querySelectorAll('.kgc').forEach(function(b) {
    var n = parseFloat(b.textContent.replace(',', '.').replace(' kg', ''));
    b.classList.toggle('on', n === v);
  });
  updKgP();
}
function onCusKg(v) {
  var n = parseFloat(v);
  if (n > 0) {
    kgSel = n;
    document.querySelectorAll('.kgc').forEach(function(b) { b.classList.remove('on'); });
    updKgP();
  } else {
    kgSel = 0;
    document.getElementById('kgpv').textContent = '';
    document.getElementById('kgps').textContent = '';
  }
}
function updKgP() {
  if (!kgPend || kgSel <= 0) return;
  var it = menu[kgPend.cat].items[kgPend.idx];
  document.getElementById('kgpv').textContent = fP(it.priceKg * kgSel);
  document.getElementById('kgps').textContent = String(kgSel).replace('.', ',') + ' kg de ' + it.name;
}
function confirmKg() {
  if (!kgPend || kgSel <= 0) { alert('Informe a quantidade em kg!'); return; }
  var it = menu[kgPend.cat].items[kgPend.idx];
  var tot = it.priceKg * kgSel;
  cart.push({
    key: it.name + '_' + Date.now(),
    name: it.name, emoji: it.emoji, img: it.img || null,
    priceKg: it.priceKg, kg: kgSel, price: tot,
    label: String(kgSel).replace('.', ',') + ' kg'
  });
  updCart();
  closeKg();
}

// ── CARRINHO ──
function updCart() {
  var t = cart.reduce(function(s, i) { return s + i.price; }, 0);
  document.getElementById('cart-count').textContent = cart.length;
  document.getElementById('cart-total-bar').textContent = fP(t);
  document.getElementById('cart-bar').classList.toggle('hidden', cart.length === 0);
}
function getTotal() { return cart.reduce(function(s, i) { return s + i.price; }, 0); }
function openCart() { document.getElementById('overlay').classList.add('open'); renderCart(); }
function closeCart() { document.getElementById('overlay').classList.remove('open'); }
function closeIfOut(e) { if (e.target === document.getElementById('overlay')) closeCart(); }

function rmItem(key) {
  cart = cart.filter(function(i) { return i.key !== key; });
  updCart(); renderCart();
}
function addHalf(key) {
  var f = cart.find(function(i) { return i.key === key; });
  if (!f) return;
  var nkg = parseFloat((f.kg + 0.5).toFixed(1));
  cart = cart.filter(function(i) { return i.key !== key; });
  cart.push({ key: f.name + '_' + Date.now(), name: f.name, emoji: f.emoji, priceKg: f.priceKg, kg: nkg, price: f.priceKg * nkg, label: String(nkg).replace('.', ',') + ' kg' });
  updCart(); renderCart();
}

function togPay(m) {
  var i = selPay.indexOf(m);
  if (i > -1) selPay.splice(i, 1); else selPay.push(m);
  document.querySelectorAll('.po').forEach(function(el) {
    var s = selPay.includes(el.dataset.pay);
    el.classList.toggle('sel', s);
    el.querySelector('.pck').textContent = s ? '✓' : '';
  });
  var t = document.getElementById('tw');
  if (t) t.className = 'tw' + (selPay.includes('dinheiro') ? ' show' : '');
}
function togEnt(el) {
  selEnt = el.dataset.tipo;
  document.querySelectorAll('.do').forEach(function(e) { e.classList.toggle('sel', e.dataset.tipo === selEnt); });
  var aw = document.getElementById('aw');
  if (aw) aw.className = 'aw' + (selEnt === 'entrega' ? ' show' : '');
}

function renderCart() {
  var sc = document.getElementById('sheet-content');
  if (cart.length === 0) {
    sc.innerHTML = '<div class="s-head">Seu pedido</div><div class="ce-wrap"><div class="ce-em">🛒</div><div class="ce-msg">Nenhum item adicionado</div></div>';
    return;
  }

  var h = '<div class="s-head">Seu pedido</div><div class="s-sub">Confira antes de finalizar</div>';

  // Itens — usamos data attributes para evitar escaping de onclick
  var itemsHtml = '';
  for (var idx = 0; idx < cart.length; idx++) {
    var item = cart[idx];
    itemsHtml += '<div class="ci">'
      + '<div class="ci-em">' + (item.img ? '<img src="' + item.img + '" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">' : item.emoji) + '</div>'
      + '<div class="ci-inf">'
      + '<div class="ci-nm">' + item.name + '</div>'
      + '<div class="ci-kg">' + item.label + '</div>'
      + '<div class="ci-pr">' + fP(item.price) + '</div>'
      + '<div class="qrow">'
      + '<button class="qbtn" data-key="' + encodeURIComponent(item.key) + '" onclick="rmItem(decodeURIComponent(this.dataset.key))">🗑</button>'
      + '<span style="font-size:11px;color:var(--dim);padding:0 4px">' + item.label + '</span>'
      + '<button class="qbtn" data-key="' + encodeURIComponent(item.key) + '" onclick="addHalf(decodeURIComponent(this.dataset.key))">+</button>'
      + '</div></div></div>';
  }
  h += itemsHtml;

  h += '<div class="t-row"><span class="t-lbl">Total</span><span class="t-val">' + fP(getTotal()) + '</span></div><div class="sdiv"></div>';

  var pays = [
    { id: 'pix',     icon: '💠', name: 'PIX' },
    { id: 'dinheiro', icon: '💵', name: 'Dinheiro' },
    { id: 'credito',  icon: '💳', name: 'Crédito' },
    { id: 'debito',   icon: '💳', name: 'Débito' }
  ];
  h += '<div class="slbl">Pagamento</div><div class="pg">';
  pays.forEach(function(p) {
    var s = selPay.includes(p.id);
    h += '<div class="po' + (s ? ' sel' : '') + '" data-pay="' + p.id + '" onclick="togPay(this.dataset.pay)">'
      + '<div class="pck">' + (s ? '✓' : '') + '</div>'
      + '<div class="pi">' + p.icon + '</div>'
      + '<div class="pn">' + p.name + '</div></div>';
  });
  h += '</div>';
  h += '<div class="tw' + (selPay.includes('dinheiro') ? ' show' : '') + '" id="tw">'
    + '<label class="fl">Troco para quanto?</label>'
    + '<input class="fi" id="troco" type="number" placeholder="Ex: 50,00"></div>';

  h += '<div class="slbl">Tipo de entrega</div><div class="dg">'
    + '<div class="do' + (selEnt === 'retirada' ? ' sel' : '') + '" data-tipo="retirada" onclick="togEnt(this)"><div class="di">🏪</div><div class="dl">Retirada</div></div>'
    + '<div class="do' + (selEnt === 'entrega' ? ' sel' : '') + '" data-tipo="entrega"  onclick="togEnt(this)"><div class="di">🛵</div><div class="dl">Entrega</div></div>'
    + '</div>';

  h += '<div class="aw' + (selEnt === 'entrega' ? ' show' : '') + '" id="aw">'
    + '<label class="fl">CEP *</label><input class="fi" id="ecep" type="tel" placeholder="60000-000" maxlength="9">'
    + '<label class="fl">Rua *</label><input class="fi" id="erua" type="text" placeholder="Ex: Rua das Flores">'
    + '<div class="r2">'
    + '<div><label class="fl">Número *</label><input class="fi" id="enum" type="text" placeholder="123"></div>'
    + '<div><label class="fl">Complemento</label><input class="fi" id="ecomp" type="text" placeholder="Apto 2"></div>'
    + '</div>'
    + '<label class="fl">Bairro *</label><input class="fi" id="ebai" type="text" placeholder="Ex: Centro"></div>';

  h += '<div class="slbl">Seus dados</div>'
    + '<label class="fl">Nome *</label><input class="fi" id="nome" type="text" placeholder="Ex: João Silva">'
    + '<label class="fl">WhatsApp *</label><input class="fi" id="wpp" type="tel" placeholder="85999998888" maxlength="15">'
    + '<label class="fl">Observações</label><input class="fi" id="obs" type="text" placeholder="Embalagem separada...">'
    + '<button class="btn-fin" onclick="finalizar()">🐔 Finalizar pedido via WhatsApp</button>';

  sc.innerHTML = h;
}

// ── FINALIZAR ──
function finalizar() {
  var nome  = (document.getElementById('nome')?.value  || '').trim();
  var wpp   = (document.getElementById('wpp')?.value   || '').trim();
  var obs   = (document.getElementById('obs')?.value   || '').trim();
  var troco = (document.getElementById('troco')?.value || '').trim();
  var rua   = (document.getElementById('erua')?.value  || '').trim();
  var num   = (document.getElementById('enum')?.value  || '').trim();
  var comp  = (document.getElementById('ecomp')?.value || '').trim();
  var bai   = (document.getElementById('ebai')?.value  || '').trim();
  var cep   = (document.getElementById('ecep')?.value  || '').trim();

  if (!selEnt)                            { alert('Selecione Retirada ou Entrega!'); return; }
  if (selEnt === 'entrega' && !rua)       { alert('Informe a rua!'); return; }
  if (selEnt === 'entrega' && !num)       { alert('Informe o número!'); return; }
  if (selEnt === 'entrega' && !bai)       { alert('Informe o bairro!'); return; }
  if (selEnt === 'entrega' && !cep)       { alert('Informe o CEP!'); return; }
  if (!nome)                              { alert('Informe seu nome!'); return; }
  if (!wpp)                               { alert('Informe seu WhatsApp!'); return; }
  if (selPay.length === 0)               { alert('Selecione uma forma de pagamento!'); return; }

  var lbl = { pix: 'PIX', dinheiro: 'Dinheiro', credito: 'Cartão de Crédito', debito: 'Cartão de Débito' };
  var payStr = selPay.map(function(p) { return lbl[p]; }).join(' + ');

  var msg = '*NOVO PEDIDO — FORTALEZA FRANGO* 🐔\n\n';
  msg += '*Tipo:* ' + (selEnt === 'entrega' ? 'Entrega 🛵' : 'Retirada na loja 🏪') + '\n';
  if (selEnt === 'entrega') {
    msg += '*Endereço:* ' + rua + ', ' + num + (comp ? ' - ' + comp : '') + '\n';
    msg += '*Bairro:* ' + bai + '\n*CEP:* ' + cep + '\n';
  }
  msg += '*Cliente:* ' + nome + '\n*Contato:* +55' + wpp + '\n\n*ITENS:*\n';
  cart.forEach(function(i) { msg += '- ' + i.name + ' (' + i.label + ') → ' + fP(i.price) + '\n'; });
  msg += '\n*Total:* ' + fP(getTotal()) + '\n*Pagamento:* ' + payStr;
  if (selPay.includes('dinheiro') && troco) msg += '\n*Troco para:* R$ ' + parseFloat(troco).toFixed(2).replace('.', ',');
  if (obs) msg += '\n*Obs:* ' + obs;

  var pedido = {
    nome: nome, whatsapp: wpp,
    tipo: selEnt === 'entrega' ? 'Entrega' : 'Retirada',
    itens: cart.map(function(i) { return { nome: i.name, qty: 1, preco: i.price, extra: i.label }; }),
    total: getTotal(), pagamento: payStr, observacao: obs || '',
    data: new Date().toLocaleDateString('pt-BR'),
    hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
    timestamp: new Date().toISOString(), status: 'Novo'
  };
  if (selEnt === 'entrega') {
    pedido.endereco = rua + ', ' + num + (comp ? ' - ' + comp : '');
    pedido.bairro = bai; pedido.cep = cep;
  }
  if (typeof salvarPedidoFirebase === 'function') salvarPedidoFirebase(pedido);

  window.open('https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');
  var wppS = wpp;
  cart = []; selPay = []; selEnt = '';
  updCart();
  document.getElementById('sheet-content').innerHTML =
    '<div class="sw"><div class="si">🎉</div>'
    + '<div class="st">Pedido Enviado!</div>'
    + '<div class="sm">Pedido enviado pelo WhatsApp!<br>Aguarde o contato pelo número<br><strong>' + wppS + '</strong></div>'
    + '<button class="btn-back" onclick="closeCart()">← Voltar ao cardápio</button></div>';
}

// ── STATUS ──
function atualizarStatus() {
  var a = new Date(), h = a.getHours(), t = h * 60 + a.getMinutes(), d = a.getDay();
  var ok = d >= 1 && d <= 6 && t >= 420 && t < 1080;
  var pill = document.getElementById('spill'), dot = document.getElementById('sdot'), txt = document.getElementById('stxt');
  if (!pill) return;
  if (ok) {
    pill.style.cssText = 'background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22C55E;';
    dot.style.background = '#22C55E';
    txt.textContent = 'Aberto agora';
  } else {
    pill.style.cssText = 'background:rgba(181,34,8,0.1);border:1px solid rgba(181,34,8,0.25);color:#CF3010;';
    dot.style.background = '#B52208';
    dot.style.animationName = 'none';
    txt.textContent = 'Fechado no momento';
  }
}

// ── HELPERS ──
function fP(v) { return 'R$ ' + (v || 0).toFixed(2).replace('.', ','); }
function fK(v) { return (v || 0).toFixed(2).replace('.', ','); }

// ── INIT ──
atualizarStatus();
setInterval(atualizarStatus, 60000);
renderMenu('frango');
</script>
