<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortaleza Frango — Peça Agora</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#120500;--surface:#1E0B00;--surface2:#2A1200;
  --border:rgba(255,140,0,0.1);--border2:rgba(255,140,0,0.22);
  --accent:#E8350A;--gold:#F5A623;
  --text:#F5EEE0;--text2:#C4A882;--text3:#7A5C3A;
  --green:#22C55E;--red:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:18px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.header-logo{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;}
.header-logo span{color:var(--gold);}

/* ── STATUS BADGE NO HEADER ── */
.header-status{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:700;
  padding:6px 13px;border-radius:50px;
  border:1.5px solid;
  transition:all .4s;
}
.header-status.aberta{
  background:rgba(34,197,94,0.12);
  border-color:rgba(34,197,94,0.4);
  color:var(--green);
}
.header-status.fechada{
  background:rgba(239,68,68,0.12);
  border-color:rgba(239,68,68,0.35);
  color:var(--red);
}
.header-status-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
}
.header-status.aberta .header-status-dot{
  background:var(--green);
  animation:pulse-h 2s infinite;
  box-shadow:0 0 0 0 rgba(34,197,94,0.5);
}
.header-status.fechada .header-status-dot{background:var(--red);}
@keyframes pulse-h{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5);}
  70%{box-shadow:0 0 0 6px rgba(34,197,94,0);}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
}

/* ══════════════════════════════════════
   BANNER LOJA FECHADA — cobre o conteúdo
══════════════════════════════════════ */
.loja-fechada-banner{
  display:none; /* controlado por JS */
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:60px 24px;
  min-height:60vh;
}
.loja-fechada-banner.visivel{display:flex;}

.fechada-icon{font-size:72px;margin-bottom:20px;opacity:0.85;}
.fechada-titulo{
  font-family:'Oswald',sans-serif;
  font-size:30px;font-weight:700;
  color:var(--red);margin-bottom:10px;letter-spacing:1px;
}
.fechada-sub{
  font-size:15px;color:var(--text3);line-height:1.7;
  max-width:320px;
}
.fechada-horario{
  margin-top:24px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:16px 24px;
  font-size:14px;color:var(--text2);
  line-height:1.8;
}
.fechada-horario strong{color:var(--gold);}

/* ══════════════════════════════════════
   CONTEÚDO DO CARDÁPIO / FORMULÁRIO
══════════════════════════════════════ */
.loja-conteudo{
  display:none; /* controlado por JS */
}
.loja-conteudo.visivel{display:block;}

/* ── HERO ── */
.hero{
  padding:32px 20px 24px;
  text-align:center;
}
.hero-title{
  font-family:'Oswald',sans-serif;
  font-size:34px;font-weight:700;
  line-height:1.1;letter-spacing:0.5px;
  margin-bottom:8px;
}
.hero-title span{color:var(--gold);}
.hero-sub{font-size:14px;color:var(--text3);}

/* ── FORMULÁRIO EXEMPLO ── */
.form-section{
  padding:0 16px 40px;
  max-width:520px;margin:0 auto;
}
.form-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:24px 20px;
}
.form-title{
  font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;
  color:var(--gold);margin-bottom:18px;
}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.form-input{
  width:100%;border:1px solid var(--border2);border-radius:12px;
  padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;color:var(--text);background:var(--surface2);
  transition:border .2s;
}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--text3);}
.form-submit{
  width:100%;margin-top:20px;
  background:linear-gradient(135deg,var(--accent),#c0200a);
  color:#fff;border:none;border-radius:50px;
  padding:15px;font-size:16px;font-weight:700;
  cursor:pointer;transition:opacity .15s;
  font-family:'DM Sans',sans-serif;
}
.form-submit:hover{opacity:0.9;}

/* ── LOADING ── */
.status-loading{
  display:flex;align-items:center;justify-content:center;
  padding:80px 20px;
  flex-direction:column;gap:14px;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--border2);
  border-top-color:var(--gold);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text3);}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">FORTALEZA <span>FRANGO</span> 🐔</div>
  <div class="header-status fechada" id="header-status">
    <div class="header-status-dot"></div>
    <span id="header-status-text">Fechado</span>
  </div>
</div>

<!-- LOADING enquanto consulta Firebase -->
<div class="status-loading" id="status-loading">
  <div class="spinner"></div>
  <div class="loading-text">Verificando status da loja...</div>
</div>

<!-- ══ BANNER LOJA FECHADA ══ -->
<div class="loja-fechada-banner" id="loja-fechada-banner">
  <div class="fechada-icon">🔒</div>
  <div class="fechada-titulo">Loja Fechada</div>
  <div class="fechada-sub">Estamos fora do horário de atendimento no momento. Volte em breve!</div>
  <div class="fechada-horario">
    <strong>Horário de Funcionamento</strong><br>
    Seg–Sex: 11h às 22h<br>
    Sábado: 11h às 23h<br>
    Domingo: 12h às 21h
  </div>
</div>

<!-- ══ CONTEÚDO LOJA ABERTA ══ -->
<div class="loja-conteudo" id="loja-conteudo">

  <div class="hero">
    <div class="hero-title">O melhor <span>frango</span><br>de Fortaleza 🔥</div>
    <div class="hero-sub">Peça agora e receba em casa</div>
  </div>

  <div class="form-section">
    <div class="form-card">
      <div class="form-title">📋 Fazer Pedido</div>

      <div class="form-group">
        <label class="form-label">Seu nome</label>
        <input class="form-input" type="text" placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label class="form-label">WhatsApp</label>
        <input class="form-input" type="tel" placeholder="(85) 99999-9999">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de entrega</label>
        <select class="form-input">
          <option>Entrega</option>
          <option>Retirada</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <input class="form-input" type="text" placeholder="Ex: sem cebola, ponto da carne...">
      </div>

      <button class="form-submit">🛒 Enviar Pedido</button>
    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.0/firebase-firestore-compat.min.js"></script>
<script>
// ── CONFIG FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyAI6Z4Ay6atavjrsBAfc0XWndjeAX8zbCM",
  authDomain: "admin-restaurante-ebc77.firebaseapp.com",
  projectId: "admin-restaurante-ebc77",
  storageBucket: "admin-restaurante-ebc77.firebasestorage.app",
  messagingSenderId: "883332092146",
  appId: "1:883332092146:web:43af09519de61e87f1006b"
};

// ════════════════════════════════════════════════
//  LEITURA EM TEMPO REAL DO STATUS DA LOJA
//
//  O admin salva em: configuracoes/loja → { aberta: true/false }
//  Aqui usamos onSnapshot para receber a atualização
//  INSTANTANEAMENTE assim que o admin alterar o toggle.
// ════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
db.settings({ experimentalAutoDetectLongPolling: true });

db.collection('configuracoes').doc('loja')
  .onSnapshot(function(doc){
    // Esconde o loading
    document.getElementById('status-loading').style.display = 'none';

    // Se o documento não existir ainda, considera fechada
    var aberta = doc.exists ? doc.data().aberta === true : false;

    atualizarUI(aberta);
  }, function(err){
    // Erro de conexão → assume fechada por segurança
    document.getElementById('status-loading').style.display = 'none';
    atualizarUI(false);
    console.warn('Erro ao ler status da loja:', err);
  });

function atualizarUI(aberta){
  var bannerFechada  = document.getElementById('loja-fechada-banner');
  var conteudo       = document.getElementById('loja-conteudo');
  var headerStatus   = document.getElementById('header-status');
  var headerText     = document.getElementById('header-status-text');

  if(aberta){
    // ── LOJA ABERTA ──
    bannerFechada.classList.remove('visivel');
    conteudo.classList.add('visivel');

    headerStatus.className = 'header-status aberta';
    headerText.textContent  = 'Aberto agora';
  } else {
    // ── LOJA FECHADA ──
    conteudo.classList.remove('visivel');
    bannerFechada.classList.add('visivel');

    headerStatus.className = 'header-status fechada';
    headerText.textContent  = 'Fechado';
  }
}
</script>
</body>
</html>
